services:
  postgres-booking:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: booking
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${BOOKING_DB_PORT:-5432}:5432"
    volumes:
      - postgres-booking-data:/var/lib/postgresql/data
    networks:
      - ticketing
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d booking"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-inventory:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${INVENTORY_DB_PORT:-5433}:5432"
    volumes:
      - postgres-inventory-data:/var/lib/postgresql/data
    networks:
      - ticketing
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  ticketing:

volumes:
  postgres-booking-data:
  postgres-inventory-data:
